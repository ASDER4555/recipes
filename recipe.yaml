$engine: 3
$onesync: on
name: fivemland_recipe
version: 1.3.1
author: Csoki&Adam (fixed by ChatGPT)
description: FiveM Land - ESX Legacy Clean Recipe (Fixed)

tasks:

  - action: download_github
    src: https://github.com/citizenfx/cfx-server-data
    ref: master
    subpath: resources
    dest: ./resources/[cfx-default]

  - action: remove_path
    path: ./resources/[cfx-default]/[gameplay]/chat

  - action: download_github
    src: https://github.com/Bob74/bob74_ipl
    ref: master
    dest: ./resources/[standalone]/bob74_ipl

  - action: download_github
    src: https://github.com/esx-framework/esx-legacy
    ref: main
    dest: ./tmp/esx

  - action: move_path
    src: ./tmp/esx
    dest: ./resources/[esx]

  # ESX alap addonok
  - action: download_github
    src: https://github.com/esx-framework/esx_addonaccount
    ref: main
    dest: ./resources/[esx]/esx_addonaccount

  - action: download_github
    src: https://github.com/esx-framework/esx_addoninventory
    ref: main
    dest: ./resources/[esx]/esx_addoninventory

  - action: download_github
    src: https://github.com/esx-framework/esx_society
    ref: main
    dest: ./resources/[esx]/esx_society

  - action: download_github
    src: https://github.com/esx-framework/esx_basicneeds
    ref: main
    dest: ./resources/[esx]/esx_basicneeds

  # SQL
  - action: connect_database

  - action: query_database
    file: ./resources/[esx]/esx_society/sql/esx_society.sql

  - action: query_database
    file: ./resources/[esx]/esx_addonaccount/sql/esx_addonaccount.sql

  - action: query_database
    file: ./resources/[esx]/esx_addoninventory/sql/esx_addoninventory.sql

  # oxmysql
  - action: download_file
    url: https://github.com/overextended/oxmysql/releases/latest/download/oxmysql.zip
    path: ./tmp/oxmysql.zip

  - action: unzip
    src: ./tmp/oxmysql.zip
    dest: ./resources/[ox]

  # ox_lib
  - action: download_file
    url: https://github.com/overextended/ox_lib/releases/latest/download/ox_lib.zip
    path: ./tmp/ox_lib.zip

  - action: unzip
    src: ./tmp/ox_lib.zip
    dest: ./resources/[ox]

  # ox_inventory (OFFICIAL)
  - action: download_file
    url: https://github.com/overextended/ox_inventory/releases/latest/download/ox_inventory.zip
    path: ./tmp/ox_inventory.zip

  - action: unzip
    src: ./tmp/ox_inventory.zip
    dest: ./resources/[ox]

  # voice
  - action: download_github
    src: https://github.com/AvarianKnight/pma-voice
    ref: main
    dest: ./resources/[standalone]/pma-voice

  # screenshot
  - action: download_github
    src: https://github.com/project-error/screenshot-basic
    ref: master
    dest: ./resources/[standalone]/screenshot-basic

  # appearance
  - action: download_github
    src: https://github.com/IlleniumStudios/illenium-appearance
    ref: main
    dest: ./resources/[standalone]/illenium-appearance

  - action: query_database
    file: ./resources/[standalone]/illenium-appearance/sql/management_outfits.sql

  - action: query_database
    file: ./resources/[standalone]/illenium-appearance/sql/player_outfits.sql

  # NPWD
  - action: download_file
    url: https://github.com/project-error/npwd/releases/latest/download/npwd.zip
    path: ./tmp/npwd.zip

  - action: unzip
    src: ./tmp/npwd.zip
    dest: ./resources/[standalone]

  - action: query_database
    file: ./resources/[standalone]/npwd/import.sql

  # config fix
  - action: replace_string
    file: ./resources/[standalone]/npwd/config.json
    search: '"defaultLanguage": "en"'
    replace: '"defaultLanguage": "hu"'

  # cleanup
  - action: remove_path
    path: ./tmp
